<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>gibol.in</title>

        <!-- Material Design Theming -->
        <link rel="stylesheet" href="https://code.getmdl.io/1.1.3/material.orange-indigo.min.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <script defer src="https://code.getmdl.io/1.1.3/material.min.js"></script>

        <!-- vue.js -->
        <script src="https://unpkg.com/vue"></script>
        <script src="https://cdn.jsdelivr.net/npm/vue-resource@1.3.4"></script>

        <!-- custom stylesheet -->
        <link rel="stylesheet" href="main.css">

	    <script src="https://www.gstatic.com/firebasejs/4.6.0/firebase.js"></script>
        <script src="js/config.js"></script>
        <script type="text/javascript">
        initApp = function() {
        firebase.auth().onAuthStateChanged(function(user) {
            if (user) {
                // User is signed in.
                var displayName = user.displayName;
                user.getIdToken().then(function(accessToken) {
                    // document.getElementById('title-container').textContent = 'Welcome '+displayName;
                    document.getElementById('sign-in-status').textContent = 'Signed in as: '+user.email;
                    Vue.component('dir-item', {
                        template: '#mix-template',
                        props: ['title'],
                        data: function () {
                            return {
                                open: false,
                                albumList: [],
                            }
                        },
                        methods: {
                            toggle: function (){
                                this.open = !this.open;
                                this.$http.get('http://localhost:3000/list/'+this.title).then(response => {
                                    this.albumList = JSON.parse(response.body);
                                }, response => {
                                    console.log("Cannot fetch album for "+serie);
                                });
                            }
                        },
                    })
                    Vue.component('album-item', {
                        template: '#album-template',
                        props: ['serie', 'album'],
                        data: function () {
                            return {
                                open: false,
                                m3u8Text: "m3u8",
                                m3u8Link: null,

                                showCopyModal: false,
                            }
                        },
                        methods: {
                            toggle: function (){
                                this.open = !this.open;
                            },
                            generateLink: function () {
                                if (!this.m3u8Link) {
                                    this.$http.get('http://localhost:3000/token').then(response => {
                                        token = JSON.parse(response.body).token;
                                        this.m3u8Link = "http://localhost:3000/audio/"+this.serie+"/"+this.album+"/playlist.m3u8?token="+token;
                                    }, response => {
                                        console.log("Cannot get token from server");
                                    });
                                }
                                this.showCopyModal = true
                            },
                        },
                    })
                    Vue.component('modal', {
                        template: '#modal-template',
                        props: ['link'],
                        methods: {
                            // Copy link to clipboard
                            copyLink: function() {
                                this.$refs.link.select();
                                document.execCommand('copy');
                            },
                        }
                    })
                    Vue.http.headers.common['Authorization'] = 'Bearer '+accessToken;
                    var rootListVue = new Vue({
                        el: '#rootlist',
                        data: {
                            rootList: [],
                        },
                        created: function () {
                            console.log('app created')
                            this.getCatalog();
                        },
                        methods: {
                            getCatalog: function () {
                                this.$http.get('http://localhost:3000/list/').then(response => {
                                    this.rootList = JSON.parse(response.body);
                                }, response => {
                                    console.log("Cannot fetch list");
                                });
                            },
                        }
                    });
                });
            } else {
                // User is signed out.
                document.location.href = '/login.html';
            }
            }, function(error) {
                    console.log(error);
                });
            };
        window.addEventListener('load', function() {
        initApp()
        });
        </script>
    </head>
    <body>
        <div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">

        <!-- Header section containing title -->
        <header class="mdl-layout__header mdl-color-text--white mdl-color--indigo-500">
            <div class="mdl-cell mdl-cell--12-col mdl-cell--12-col-tablet mdl-grid">
                <div class="mdl-layout__header-row mdl-cell mdl-cell--12-col mdl-cell--12-col-tablet mdl-cell--8-col-desktop">
                    <a href="/"><h3>gibol.in</h3></a>
                </div>
            </div>
        </header>

        <!-- main container -->
        <main class="mdl-layout__content mdl-color--grey-100">
        <div class="mdl-cell mdl-cell--12-col mdl-cell--12-col-tablet mdl-grid">
            <script type="text/x-template" id="mix-template">
                <li>
                    <span class="mix-line" @click="toggle">[{{open ? '-' : '+'}}]</span>
                    {{ title }}
                    <div v-if="open">
                        <ul>
                            <li is="album-item" v-for="a in albumList" v-bind:serie="title" v-bind:album="a.name" v-if="a.dir"></li>
                        </ul>
                    </div>
                </li>
            </script>
            <script type="text/x-template" id="modal-template">
                <transition name="modal">
                    <div class="modal-mask">
                    <div class="modal-wrapper">
                    <div class="modal-container">
                        <div class="modal-header">M3U8 URL</div>
                        <div class="modal-body">
                            <textarea rows="1" cols="40" style="overflow:hidden" wrap="off" ref="link">{{link}}</textarea>
                            <i class="material-icons" v-on:click="copyLink">content_copy</i>
                        </div>
                        <div class="modal-footer">
                            T <button class="modal-default-button" @click="$emit('close')">OK</button>
                        </div>
                    </div>
                    </div>
                    </div>
                </transition>
            </script>
            <script type="text/x-template" id="album-template">
                <li>
                    <span class="mix-line" @click="toggle">[{{open ? '-' : '+'}}]</span>
                    {{ album }}
                    <div v-if="open">
                        <ul>
                            <li class="mix-line" v-on:click="generateLink">m3u8</li>
                            <!-- li style="cursor:not-allowed">zip</li -->
                        </ul>
                    </div>
                    <modal v-if="showCopyModal" v-on:close="showCopyModal = false" v-bind:link="m3u8Link" />
                </li>
            </script>
            <ul id="rootlist" class="mdl-list">
                <li is="dir-item"
                    v-for="d in rootList"
                    v-bind:title="d.name"
                    v-if="d.dir"
                ></li>
            </ul>
        </div>
        </main>
        <footer class="mdl-mini-footer">
            <div class="mdl-mini-footer--left-section">
                <span id="sign-in-status"></span>
            </div>
        </footer>
        </div>
    </body>
</html>
