<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>gibol.in</title>

        <!-- CSS -->
        <link rel="stylesheet" href="main.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/hack/0.8.0/hack.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <!-- vue.js -->
        <script src="https://unpkg.com/vue"></script>
        <script src="https://cdn.jsdelivr.net/npm/vue-resource@1.3.4"></script>

        <!-- google and stuff -->
	    <script src="https://www.gstatic.com/firebasejs/4.6.0/firebase.js"></script>
        <script src="js/config.js"></script>

        <script type="text/javascript">
        initApp = function() {
        firebase.auth().onAuthStateChanged(function(user) {
            if (user) {
                // User is signed in.
                var displayName = user.displayName;
                user.getIdToken().then(function(accessToken) {
                    // document.getElementById('title-container').textContent = 'Welcome '+displayName;
                    document.getElementById('sign-in-status').textContent = 'Signed in as: '+user.email;
                    Vue.component('dir-item', {
                        template: '#mix-template',
                        props: ['title'],
                        data: function () {
                            return {
                                open: false,
                                albumList: [],
                            }
                        },
                        methods: {
                            toggle: function (){
                                this.open = !this.open;
                                this.$http.get('http://localhost:3001/list/'+this.title).then(response => {
                                    this.albumList = JSON.parse(response.body);
                                }, response => {
                                    console.log("Cannot fetch album for "+serie);
                                });
                            }
                        },
                    })
                    Vue.component('album-item', {
                        template: '#album-template',
                        props: ['serie', 'album'],
                        data: function () {
                            return {
                                open: false,
                                m3u8Text: "m3u8",
                                m3u8Link: null,

                                showCopyModal: false,
                            }
                        },
                        methods: {
                            toggle: function (){
                                this.open = !this.open;
                            },
                            generateLink: function () {
                                if (!this.m3u8Link) {
                                    this.$http.get('http://localhost:3001/token/'+this.serie+'/'+this.album).then(response => {
                                        token = JSON.parse(response.body).token;
                                        this.m3u8Link = "http://localhost:3001/m3u8/"+token;
                                    }, response => {
                                        console.log("Cannot get token from server");
                                    });
                                }
                                this.showCopyModal = true
                            },
                        },
                    })
                    Vue.component('modal', {
                        template: '#modal-template',
                        props: ['link'],
                        methods: {
                            // Copy link to clipboard
                            copyLink: function() {
                                this.$refs.link.select();
                                document.execCommand('copy');
                            },
                        }
                    })
                    Vue.http.headers.common['Authorization'] = 'Bearer '+accessToken;
                    var rootListVue = new Vue({
                        el: '#rootlist',
                        data: {
                            rootList: [],
                        },
                        created: function () {
                            console.log('app created')
                            this.getCatalog();
                        },
                        methods: {
                            getCatalog: function () {
                                this.$http.get('http://localhost:3001/list/').then(response => {
                                    this.rootList = JSON.parse(response.body);
                                }, response => {
                                    console.log("Cannot fetch list");
                                });
                            },
                        }
                    });
                });
            } else {
                // User is signed out.
                document.location.href = '/login.html';
            }
            }, function(error) {
                    console.log(error);
                });
            };
        window.addEventListener('load', function() {
        initApp()
        });
        </script>
    </head>
    <body class="hack">
            <script type="text/x-template" id="mix-template">
                <div class="card">
                    <header class="card-header artist-name" @click="toggle">
                        {{ title }}
                    </header>
                    <div class="card-content" v-if="open">
                        <div is="album-item" v-for="a in albumList" v-bind:serie="title" v-bind:album="a.name" v-if="a.dir"></div>
                    </div>
                </div>
            </script>
            <script type="text/x-template" id="modal-template">
                <transition name="modal">
                    <div class="modal-mask">
                    <div class="modal-wrapper">
                    <div class="card modal-container">
                        <div class="card-header">M3U8 URL</div>
                        <div class="card-content">
                            <div class="grid">
                                <div class="cell -7of12">
                                    <textarea rows="1" cols="25" style="overflow:hidden" wrap="off" ref="link">{{link}}</textarea>
                                </div>
                                <div class="cell -1of12">
                                    <i class="material-icons copy-icon" v-on:click="copyLink">content_copy</i>
                                </div>
                            </div>
                            <div class="grid">
                                <div class="cell -12of12">
                                    <button class="modal-btn" @click="$emit('close')">OK</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    </div>
                    </div>
                </transition>
            </script>
            <script type="text/x-template" id="album-template">
                <div class="grid album-line">
                    <div class="cell -6of12">
                        <div class="album-title">{{ album }}</div>
                    </div>
                    <div class="cell -1of12 m3u8-cell">
                        <div class="album-url" v-on:click="generateLink">m3u8</div>
                        <modal v-if="showCopyModal" v-on:close="showCopyModal = false" v-bind:link="m3u8Link" />
                    </div>
                    <!--<div class="cell -1of12 zip-cell">
                        <div class="album-url">zip</div>
                    </div>-->
                </div>
            </script>
            <div class="main container">
                <h1>gibol.in</h1>
                <div id="rootlist">
                    <div is="dir-item"
                        v-for="d in rootList"
                        v-bind:title="d.name"
                        v-if="d.dir"> 
                    </div>
                </div>
                <div id="sign-in-status" class="help-block"></div>
            </div>
    </body>
</html>
