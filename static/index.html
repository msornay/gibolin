<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Gibolin</title>
  
    <!-- Material Design Theming -->
    <link rel="stylesheet" href="https://code.getmdl.io/1.1.3/material.orange-indigo.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script defer src="https://code.getmdl.io/1.1.3/material.min.js"></script>
    <script src="https://unpkg.com/vue"></script>

    <!-- custom stylesheet -->
    <link rel="stylesheet" href="main.css">

	<script src="https://www.gstatic.com/firebasejs/4.6.0/firebase.js"></script>
    <script src="js/config.js"></script>
    <script type="text/javascript">
      initApp = function() {
        firebase.auth().onAuthStateChanged(function(user) {
          if (user) {
            // User is signed in.
            var displayName = user.displayName;
            var email = user.email;
            var emailVerified = user.emailVerified;
            var photoURL = user.photoURL;
            var uid = user.uid;
            var phoneNumber = user.phoneNumber;
            var providerData = user.providerData;
            user.getIdToken().then(function(accessToken) {
              document.getElementById('title-container').textContent = 'Welcome '+displayName;
              document.getElementById('quickstart-sign-in-status').textContent = 'signed in';
              document.getElementById('account-details').textContent = accessToken;
             // document.getElementById('account-details').textContent = JSON.stringify({
             //   displayName: displayName,
             //   email: email,
             //   emailVerified: emailVerified,
             //   phoneNumber: phoneNumber,
             //   photoURL: photoURL,
             //   uid: uid,
             //   accessToken: accessToken,
             //   providerData: providerData
             // }, null, '  ');
            });
          } else {
            // User is signed out.
            document.location.href = '/login.html';
          }
        }, function(error) {
          console.log(error);
        });
      };

      window.addEventListener('load', function() {
        initApp()
      });
    </script>
  </head>
  <body>
    <div class="demo-layout mdl-layout mdl-js-layout mdl-layout--fixed-header">
      <!-- Header section containing title -->
      <header class="mdl-layout__header mdl-color-text--white mdl-color--light-blue-700">
          <div class="mdl-cell mdl-cell--12-col mdl-cell--12-col-tablet mdl-grid">
              <div class="mdl-layout__header-row mdl-cell mdl-cell--12-col mdl-cell--12-col-tablet mdl-cell--8-col-desktop">
                  <a href="/"><h3>Gibolin</h3></a>
              </div>
          </div>
      </header>

      <!-- main container -->
      <main class="mdl-layout__content mdl-color--grey-100">
      <div class="mdl-cell mdl-cell--12-col mdl-cell--12-col-tablet mdl-grid">
          <div class="mdl-card mdl-shadow--2dp mdl-cell mdl-cell--12-col mdl-cell--12-col-tablet mdl-cell--12-col-desktop">
              <!-- main container header -->
              <div class="mdl-card__title mdl-color--light-blue-600 mdl-color-text--white">
                  <h2 id="title-container" class="mdl-card__title-text"></h2>
              </div>
              <!-- main container details -->
              <div class="mdl-card__supporting-text mdl-color-text--grey-600">
                    <script type="text/x-template" id="mix-template">
    		            <li>
            			    <div
    	    	        	 class="mix-line"
                			 @click="toggle">
		            	    	{{ title }}
			            	    <span>[{{open ? '-' : '+'}}]</span>
    
            			    <div v-if="open">
		            		    <audio controls>
    		    		          <source src="dexter.mp3" type="audio/mpeg">
            	    			  Your browser does not support the audio element.
		        	    	    </audio>
			                </div>
            		    	</div>
    		            </li>
            	    </script>

                    <ul id="app">
        		        <li
                		  is="mix-item"
		                  v-for="mix in mixes"
                		  v-bind:title="mix.title"
                		></li>
                    </ul>

                    <script>
		                Vue.component('mix-item', {
                			template: '#mix-template',
	        	        	props: ['title'],
                			data: function () {
		                		return {
				                	open: false
    	    	    		    }
        	        		},
        			        methods: {
        		        		toggle: function (){ this.open = !this.open }
                			},
		                })
                		var app = new Vue({
		                	el: '#app',
        		        	data: {
	    	        		    mixes: [
                				{title: 'DJ Kicks 1'},
		                		{title: 'DJ Kicks 2'},
				                {title: 'DJ Kicks 3'},
        	        			]   
		    	            }
        	        	})  
                    </script>
                  <div id="account-details"></div>
                   <button class="mdl-button mdl-js-button mdl-button--raised" id="generate-url" name="generateurl">Generate stream URL</button>

                  <!-- Container where we'll display the user details -->
                  <div class="quickstart-user-details-container">
                      Firebase sign-in status: <span id="quickstart-sign-in-status">Unknown</span>
                  </div>
              </div>
          </div>
      </div>
      </main>
    </div>
  </body>
</html>
