services:
  postgres:
    image: pgautoupgrade/pgautoupgrade:latest
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init-prod.sql:/docker-entrypoint-initdb.d/init-prod.sql
    env_file:
      - .env.prod

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.prod
    depends_on:
      - postgres
